<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이노시뮬레이션 명함 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F7F5;
    --panel: #FFFFFF;
    --ink: #1B2430;
    --ink-soft: #5C6675;
    --border: #DFE3E6;
    --accent: #2F5D5A;
    --warn: #D9633B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    padding: 28px 20px 60px;
  }
  .wrap { max-width: 780px; margin: 0 auto; }
  .eyebrow {
    font-size: 12px; letter-spacing: .12em; color: var(--ink-soft);
    font-weight: 600; text-transform: uppercase; margin-bottom: 6px;
  }
  h1 { font-size: 26px; font-weight: 800; margin: 0; }
  .sub { font-size: 13.5px; color: var(--ink-soft); margin-top: 6px; }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 20px;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label.field-label {
    display: block; font-size: 12.5px; font-weight: 600;
    color: var(--ink-soft); margin-bottom: 5px;
  }
  input[type=text], input[type=email] {
    width: 100%; padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--border); font-size: 14px; font-family: inherit; outline: none;
  }
  .hint { font-size: 12px; margin-top: 4px; font-weight: 600; }
  .hint.ok { color: var(--accent); }
  .hint.bad { color: var(--warn); }
  .checkbox-row {
    display: flex; align-items: center; gap: 8px; font-size: 12.5px;
    font-weight: 600; color: var(--ink-soft); margin-top: 22px; cursor: pointer;
  }
  .preview-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
  }
  .preview-title { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); margin-bottom: 10px; }
  canvas { width: 100%; max-width: 708px; height: auto; border: 1px solid var(--border); border-radius: 6px; display: block; }
  button.primary {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 9px; padding: 13px 0; font-size: 14.5px; font-weight: 700;
    cursor: pointer; margin-top: 18px;
  }
  button.primary:disabled { opacity: .6; cursor: not-allowed; }
  .footnote { margin-top: 14px; font-size: 12px; color: var(--ink-soft); line-height: 1.6; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 10px;
    font-size: 13.5px; box-shadow: 0 8px 24px rgba(0,0,0,.18); display: none; z-index: 99;
  }
  .done-screen {
    display: none; text-align: center; padding: 60px 20px;
  }
  .done-screen .check {
    width: 56px; height: 56px; border-radius: 50%; background: var(--accent);
    color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
</style>
</head>
<body>
<div class="wrap" id="formScreen">
  <div class="eyebrow">INNOSIMULATION · Card Studio</div>
  <h1>명함 신청</h1>
  <p class="sub">이름을 입력하면 부서·직급이 자동으로 채워져요. 신청하면 담당자에게 명함 이미지가 자동 발송됩니다.</p>

  <div class="panel">
    <div class="grid">
      <div>
        <label class="field-label">이름</label>
        <input type="text" id="nameInput" placeholder="예: 김수영" />
        <div class="hint" id="nameHint"></div>
      </div>
      <div>
        <label class="field-label">영문명</label>
        <input type="text" id="englishNameInput" placeholder="예: SUYOUNG KIM" />
      </div>
      <div>
        <label class="field-label">전화번호(휴대폰)</label>
        <input type="text" id="mobileInput" placeholder="010 0000 0000" />
      </div>
      <div>
        <label class="field-label">이메일 (@innosim.com 앞부분만)</label>
        <input type="text" id="emailInput" placeholder="honggildong" />
      </div>
    </div>

    <label class="checkbox-row" id="manualModeRow" style="margin-top:14px;">
      <input type="checkbox" id="manualModeCheck" />
      부서/직급 커스텀 수정하기
    </label>

    <div id="manualFieldsBox" style="display:none; margin-top:14px; padding-top:14px; border-top:1px dashed var(--border);">
      <div class="grid">
        <div>
          <label class="field-label">부서 (예: CMO실 / 영업지원팀)</label>
          <input type="text" id="manualDeptInput" placeholder="부서명을 입력해 주세요" />
        </div>
        <div>
          <label class="field-label">직급 (예: 프로, 매니저)</label>
          <input type="text" id="manualRankInput" placeholder="직급을 입력해 주세요" />
        </div>
        <div>
          <label class="field-label">부서 영문 (예: Sales Support Team / CMO)</label>
          <input type="text" id="manualDeptEnInput" placeholder="부서 영문명을 입력해 주세요" />
        </div>
        <div>
          <label class="field-label">직급 영문 (예: Pro., Manager)</label>
          <input type="text" id="manualRankEnInput" placeholder="직급 영문명을 입력해 주세요" />
        </div>
      </div>
    </div>
  </div>

  <p class="sub" style="margin-bottom:16px;">
    ※ 위 이미지는 입력하신 내용을 확인하기 위한 미리보기입니다. 
       실제 제작되는 명함은 기존 명함과 동일한 규격(사이즈·비율)에 맞춰 제작됩니다.
  </p>

  <div class="preview-card">
    <div class="preview-title">앞면 (한글)</div>
    <canvas id="frontCanvas"></canvas>
  </div>
  <div class="preview-card">
    <div class="preview-title">뒷면 (영문)</div>
    <canvas id="backCanvas"></canvas>
  </div>

  <label class="checkbox-row" id="confirmRow" style="margin-top:4px;">
    <input type="checkbox" id="confirmCheck" />
    위 명함에 표시된 이름 / 부서 / 직급 / 전화번호 / 이메일 정보를 모두 확인했습니다.
  </label>

  <button class="primary" id="submitBtn">신청서 제출하기</button>
</div>

<div class="wrap done-screen" id="doneScreen">
  <div class="check">✓</div>
  <h1>신청이 완료됐어요</h1>
  <p class="sub">담당자 확인 후 명함이 제작됩니다.</p>
</div>

<div class="toast" id="toast"></div>

// ⚠️ 배포 시 아래 URL을 본인의 구글 앱스스크립트 웹앱 URL로 교체하세요.
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGLqHLuL5R2VIQvetEvFZ2M2tBdqZMPdsD5fTrpqRDUcRaGqfxT2MsKEgyF9YUVyictA/exec";

const CARD_W = 708;
const CARD_H = 409;
const KOR_FONT = "'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif";
const NUM_FONT = "'Roboto Condensed', Arial, sans-serif";

const FRONT_LAYOUT = {

};

// 데모용 샘플 직원 명단 — 구글시트 연결 전 기본값
const SAMPLE_DIRECTORY = [
  { name: "김수영", dept: "CMO실 / 영업지원팀", deptEn: "Sales Support Team / CMO", rank: "프로", rankEn: "Pro.", email: "suyoung.kim@innosim.com" },
  { name: "이노심", dept: "CTO실 / 개발팀", deptEn: "Development Team / CTO", rank: "책임", rankEn: "Principal", email: "innosim.lee@innosim.com" },
  { name: "박테스트", dept: "경영지원팀", deptEn: "Corporate Support Team", rank: "사원", rankEn: "Staff", email: "test.park@innosim.com" },
];

// ⚠️ 구글시트를 "웹에 게시 > CSV" 한 링크를 여기에 붙여넣으면 명단이 자동 연결됩니다.
// 시트 열 순서: 이름, 부서, 부서(영문), 직급, 직급(영문), 이메일(전체 주소)
const DIRECTORY_CSV_URL = "https://docs.google.com/spreadsheets/d/1dnI_6UYOKcruB70BeeBLXsfwMw-9rdHUCUVJ9PySRXY/export?format=csv&gid=0";

let DIRECTORY = SAMPLE_DIRECTORY;

function stripEmailDomain(email) {
  return (email || "").replace(/@innosim\.com\s*$/i, "").trim();
}

function parseCsv(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  const rows = lines.slice(1); // 첫 줄(헤더) 제외
  return rows.map(line => {
    const cells = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
    return {
      name: cells[0] || '',
      dept: cells[1] || '',
      deptEn: cells[2] || '',
      rank: cells[3] || '',
      rankEn: cells[4] || '',
      email: stripEmailDomain(cells[5] || ''),
    };
  }).filter(r => r.name);
}

if (DIRECTORY_CSV_URL.indexOf('PASTE_YOUR') !== 0) {
  fetch(DIRECTORY_CSV_URL)
    .then(res => res.text())
    .then(text => {
      const parsed = parseCsv(text);
      if (parsed.length > 0) {
        DIRECTORY = parsed;
        findMatch();
        render();
      }
    })
    .catch(() => { /* 실패 시 샘플 명단 유지 */ });
}

const frontCanvas = document.getElementById('frontCanvas');
const backCanvas = document.getElementById('backCanvas');
const frontImg = new Image();
const backImg = new Image();
let frontLoaded = false, backLoaded = false;
frontImg.onload = () => { frontLoaded = true; render(); };
backImg.onload = () => { backLoaded = true; render(); };
frontImg.src = FRONT_IMG_SRC;
backImg.src = BACK_IMG_SRC;

function drawCard(canvas, img, layout, values) {
  canvas.width = CARD_W;
  canvas.height = CARD_H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CARD_W, CARD_H);
  ctx.drawImage(img, 0, 0, CARD_W, CARD_H);
  ctx.textBaseline = 'alphabetic';

  function draw(key, text) {
    const L = layout[key];
    if (!L || !text) return 0;
    ctx.fillStyle = L.color;
    ctx.font = `${L.weight} ${L.size}px ${L.font}`;
    ctx.fillText(text, L.x, L.y);
    return ctx.measureText(text).width;
  }

  draw('dept', values.dept);
  const nameWidth = draw('name', values.name);
  const rankL = layout.rank;
  if (rankL && values.rank) {
    ctx.fillStyle = rankL.color;
    ctx.font = `${rankL.weight} ${rankL.size}px ${rankL.font}`;
    const rankX = Math.max(rankL.x, layout.name.x + nameWidth + rankL.gap);
    ctx.fillText(values.rank, rankX, rankL.y);
  }
  draw('mobile', values.mobile);
  draw('email', values.email);
}

const nameInput = document.getElementById('nameInput');
const mobileInput = document.getElementById('mobileInput');
const emailInput = document.getElementById('emailInput');
const englishNameInput = document.getElementById('englishNameInput');
const nameHint = document.getElementById('nameHint');
const manualModeCheck = document.getElementById('manualModeCheck');
const manualFieldsBox = document.getElementById('manualFieldsBox');
const manualDeptInput = document.getElementById('manualDeptInput');
const manualRankInput = document.getElementById('manualRankInput');
const manualDeptEnInput = document.getElementById('manualDeptEnInput');
const manualRankEnInput = document.getElementById('manualRankEnInput');

let matched = null;
let lastAutoFilledFor = null;

function findMatch() {
  const n = nameInput.value.trim();
  matched = DIRECTORY.find(d => d.name === n) || null;
  if (matched) {
    nameHint.textContent = `✓ ${matched.dept} · ${matched.rank}`;
    nameHint.className = 'hint ok';
    if (lastAutoFilledFor !== matched.name && matched.email) {
      emailInput.value = matched.email;
      lastAutoFilledFor = matched.name;
    }
  } else {
    nameHint.textContent = '';
  }
}

manualModeCheck.addEventListener('change', () => {
  manualFieldsBox.style.display = manualModeCheck.checked ? 'block' : 'none';
  render();
});

function currentDeptRank() {
  if (manualModeCheck.checked) {
    return {
      dept: manualDeptInput.value.trim(),
      rank: manualRankInput.value.trim(),
      deptEn: manualDeptEnInput.value.trim(),
      rankEn: manualRankEnInput.value.trim(),
    };
  }
  if (matched) return { dept: matched.dept, rank: matched.rank, deptEn: matched.deptEn, rankEn: matched.rankEn };
  return { dept: '', rank: '', deptEn: '', rankEn: '' };
}

function render() {
  if (!frontLoaded || !backLoaded) return;
  findMatch();
  const name = nameInput.value.trim();
  const mobile = mobileInput.value.trim();
  const email = emailInput.value.trim();
  const fullEmail = email ? `${email}@innosim.com` : '';
  const dr = currentDeptRank();

  const frontValues = { dept: dr.dept, name, rank: dr.rank, mobile, email: fullEmail };
  const backValues = {
    dept: dr.deptEn,
    name: englishNameInput.value.trim().toUpperCase(),
    rank: dr.rankEn,
    mobile: mobile.replace(/^0/, '82 '),
    email: fullEmail,
  };

  drawCard(frontCanvas, frontImg, FRONT_LAYOUT, frontValues);
  drawCard(backCanvas, backImg, BACK_LAYOUT, backValues);
}

[nameInput, mobileInput, emailInput, englishNameInput, manualDeptInput, manualRankInput, manualDeptEnInput, manualRankEnInput].forEach(el => el.addEventListener('input', render));
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(render); // 웹폰트 로딩 완료 후 정확한 폰트로 다시 그리기
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2600);
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const name = nameInput.value.trim();
  const englishName = englishNameInput.value.trim();
  const mobile = mobileInput.value.trim();
  const email = emailInput.value.trim();
  const dr = currentDeptRank();

  const missing = [];
  if (!name) missing.push('이름');
  if (!englishName) missing.push('영문명');
  if (!mobile) missing.push('전화번호');
  if (!email) missing.push('이메일');
  if (!dr.dept) missing.push('부서 (명단에 없으면 "부서/직급 커스텀 수정하기" 체크 후 입력)');
  if (!dr.rank) missing.push('직급');
  if (!dr.deptEn) missing.push('부서 영문');
  if (!dr.rankEn) missing.push('직급 영문');

  if (missing.length > 0) {
    showToast(`다음 항목을 입력해 주세요: ${missing.join(', ')}`);
    return;
  }
  if (!document.getElementById('confirmCheck').checked) {
    showToast('명함 정보를 확인했다는 체크박스를 눌러주세요.');
    return;
  }
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    showToast('아직 배포 URL이 설정되지 않았어요. (관리자 설정 필요)');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '제출 중...';

  const payload = {
    name,
    englishName,
    dept: dr.dept,
    deptEn: dr.deptEn,
    rank: dr.rank,
    rankEn: dr.rankEn,
    mobile,
    email,
    front: frontCanvas.toDataURL('image/png'),
    back: backCanvas.toDataURL('image/png'),
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // preflight 회피용
      body: JSON.stringify(payload),
    });
    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('doneScreen').style.display = 'block';
  } catch (err) {
    showToast('제출에 실패했어요. 잠시 후 다시 시도해 주세요.');
    btn.disabled = false;
    btn.textContent = '신청서 제출하기';
  }
});
</script>
